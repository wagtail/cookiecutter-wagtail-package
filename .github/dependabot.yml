version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: '52 3 12 * *'
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: cron
      cronjob: '52 3 12 * *'
    cooldown:
      default-days: 7
    groups:
      framework:
        patterns: ['django', 'wagtail']
        versioning-strategy: lockfile-only
      python:
        patterns: ['*']
        exclude-patterns: ['django', 'wagtail']

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: cron
      cronjob: '52 3 12 * *'
    cooldown:
      default-days: 7
    groups:
      js:
        patterns: ['*']
