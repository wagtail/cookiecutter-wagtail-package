name: CI

on:
  push:
    branches:
      - main
      - 'stable/**'
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - run: uv sync --dev
      - run: just coverage
      - run: uv run ./demo/manage.py check
      - run: uv run ./demo/manage.py makemigrations --check --noinput
      - run: uv run ./demo/manage.py test home

  test-lowest-deps:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - run: just test-lowest-deps

  test-highest-deps:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - run: just test-highest-deps

  test-compatibility:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        # Supported versions of Python/Django/Wagtail, excluding oldest and newest. See:
        # - https://devguide.python.org/versions/#supported-versions
        # - https://github.com/wagtail/wagtail/wiki/Release-schedule
        # - https://docs.wagtail.org/en/stable/releases/upgrading.html#compatible-django-python-versions
        include:
          # Skipped: oldest supported versions, tested in test-lowest-deps.
          # latest-3 Python, latest-2 Django, latest Wagtail-2.
          - python: '3.11'
            packages: 'Django>=4.2,<4.3, Wagtail>=7.0,<7.1'
          # latest-2 Python, latest-1 Django, latest Wagtail-1.
          - python: '3.12'
            packages: 'Django>=5.2,<5.3, Wagtail>=7.3,<7.4'
          # latest-1 Python, latest Django, latest Wagtail.
          - python: '3.13'
            packages: 'Django>=6.0,<6.1, Wagtail>=7.4,<7.5'
          # Skipped: newest supported versions, tested in test-highest-deps.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --with '${{ matrix.packages }}' pytest
        env:
          DB: sqlite
